<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technitium Logs</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="container log-page">
    <header>
      <h1>Technitium Logs</h1>
      <div class="header-info">
        <a href="/" class="header-btn">Back to Dashboard</a>
      </div>
    </header>
    <div class="widget">
      <div class="widget-header">
        <h2>Recent Journal</h2>
        <span class="status-badge status-up" id="status">Loading</span>
      </div>
      <div class="widget-body">
        <pre class="diagnostic-log page-log" id="logs">Loading...</pre>
      </div>
    </div>
  </div>
  <script>
    async function refresh() {
      const response = await fetch('/api/service/logs?unit=technitium-dns-server&lines=120');
      const data = await response.json();
      document.getElementById('status').textContent = `${data.logs.length} lines`;
      document.getElementById('logs').textContent = (data.logs || []).join('\n') || 'No logs';
    }

    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
