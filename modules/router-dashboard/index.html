<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Router Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="dashboard-sidebar" aria-label="Dashboard navigation">
      <div class="sidebar-brand">
        <span class="brand-mark">NR</span>
        <div>
          <div class="brand-title">Router</div>
          <div class="brand-subtitle">nix-router</div>
        </div>
      </div>
      <nav class="dashboard-tabs" aria-label="Dashboard pages">
        <button class="dashboard-tab is-active" type="button" data-dashboard-tab="overview">Overview</button>
        <button class="dashboard-tab" type="button" data-dashboard-tab="network">Network</button>
        <button class="dashboard-tab" type="button" data-dashboard-tab="services">Services</button>
        <button class="dashboard-tab" type="button" data-dashboard-tab="security">Security</button>
        <button class="dashboard-tab" type="button" data-dashboard-tab="vpn">VPN</button>
      </nav>
      <div class="sidebar-footer">Powered by nix-router-optimized</div>
    </aside>

    <main class="dashboard-main">
      <div class="topbar">
        <div class="topbar-search">Search widgets, interfaces, services... <span>Ctrl+K</span></div>
        <div class="topbar-actions">
          <button class="header-btn" id="reset-layout-btn" type="button">Reset Layout</button>
          <div class="last-update" id="last-update">Loading...</div>
        </div>
      </div>

      <div class="container">
        <header>
          <div>
            <h1 id="hostname">Router Dashboard</h1>
            <div class="header-subtitle">NixOS edge status and operations</div>
          </div>
          <div class="header-info">
            <div class="header-stat">
              <div class="header-stat-label">Uptime</div>
              <div class="header-stat-value" id="uptime">--</div>
            </div>
            <div class="header-stat">
              <div class="header-stat-label">Kernel</div>
              <div class="header-stat-value" id="kernel">--</div>
            </div>
          </div>
        </header>

        <div class="dashboard-pages">
          <section class="dashboard-page is-active" id="dashboard-page-overview" data-dashboard-page="overview" aria-label="Overview dashboard">
            <div class="dashboard-grid" id="dashboard-grid-overview"></div>
          </section>
          <section class="dashboard-page" id="dashboard-page-network" data-dashboard-page="network" aria-label="Network dashboard">
            <div class="dashboard-grid" id="dashboard-grid-network"></div>
          </section>
          <section class="dashboard-page" id="dashboard-page-services" data-dashboard-page="services" aria-label="Services dashboard">
            <div class="dashboard-grid" id="dashboard-grid-services"></div>
          </section>
          <section class="dashboard-page" id="dashboard-page-security" data-dashboard-page="security" aria-label="Security dashboard">
            <div class="dashboard-grid" id="dashboard-grid-security"></div>
          </section>
          <section class="dashboard-page" id="dashboard-page-vpn" data-dashboard-page="vpn" aria-label="VPN dashboard">
            <div class="dashboard-grid" id="dashboard-grid-vpn"></div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <!-- Widget Scripts -->
  <script src="/js/widgets/base-widget.js"></script>
  <script src="/js/widgets/traffic-widget.js"></script>
  <script src="/js/widgets/system-widget.js"></script>
  <script src="/js/widgets/system-info-widget.js"></script>
  <script src="/js/widgets/interface-widget.js"></script>
  <script src="/js/widgets/connections-widget.js"></script>
  <script src="/js/widgets/services-widget.js"></script>
  <script src="/js/widgets/links-widget.js"></script>
  <script src="/js/widgets/gateway-widget.js"></script>
  <script src="/js/widgets/top-connections-widget.js"></script>
  <script src="/js/widgets/firewall-widget.js"></script>
  <script src="/js/widgets/firewall-logs-widget.js"></script>
  <script src="/js/widgets/caddy-widget.js"></script>
  <script src="/js/widgets/dns-widget.js"></script>
  <script src="/js/widgets/dhcp-widget.js"></script>
  <script src="/js/widgets/fail2ban-widget.js"></script>
  <script src="/js/widgets/speedtest-widget.js"></script>
  <script src="/js/widgets/wol-widget.js"></script>
  <script src="/js/widgets/vpn-widget.js"></script>

  <!-- Dashboard Configuration -->
  <script src="/js/config.js"></script>

  <!-- Main Dashboard Script -->
  <script src="/js/main.js"></script>
</body>
</html>
